name: Update Homebrew Formula

on:
  release:
    types: [published]
  push:
    # Also trigger when a tag is pushed (helps when a release wasn't created via GitHub UI)
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag & tarball URL
        id: tag
        run: |
          # Determine tag whether this workflow was triggered by a release or a tag push
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            # For push tag events, the ref is refs/tags/<tag>
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          TARURL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "tarball_url=$TARURL" >> "$GITHUB_OUTPUT"

      - name: Download tarball and compute sha256
        id: hash
        run: |
          curl -sL "${{ steps.tag.outputs.tarball_url }}" -o nim.tar.gz
          sha256=$(sha256sum nim.tar.gz | cut -d' ' -f1)
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Install Dagger CLI (for verification)
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin sh

      - name: Verify build with Dagger
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Verifying build for ${VERSION} using Dagger"
          export DAGGER_NO_NAG=1
          # Run the project's CI/build pipeline to reproduce artifacts
          cd ci
          dagger run go run . --build --version="$VERSION" --output=../tmp/dist
          cd ..
          echo "Built artifacts:"
          ls -la tmp/dist || true
          # Smoke-test the linux amd64 binary if present
          if [ -x tmp/dist/nim-linux-amd64 ]; then
            tmp/dist/nim-linux-amd64 --version || true
          fi

      - name: Update Formula file
        run: |
          # Replace url and sha256 lines in Formula/nim.rb
          sed -E -i "s|^  url \\".*\\"$|  url \"${{ steps.release.outputs.tarball_url }}\"|" Formula/nim.rb
          sed -E -i "s|^  sha256 \\".*\\"$|  sha256 \"${{ steps.hash.outputs.sha256 }}\"|" Formula/nim.rb
          # Also update version placeholder if present by ensuring file contains the tag in url

      - name: Commit and push
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "${GIT_COMMITTER_NAME}"
          git config user.email "${GIT_COMMITTER_EMAIL}"
          git add Formula/nim.rb
          git commit -m "chore(homebrew): update formula for ${{ steps.release.outputs.tag }}"
          git push
